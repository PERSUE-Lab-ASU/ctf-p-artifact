server:
  http_listen_port: 9080
  grpc_listen_port: 0

# Use persistent positions file
positions:
  filename: /tmp/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Durable workspace session files written to the host by the Coder template.
  # These continue to exist after the participant container is stopped/removed.
  - job_name: ctf-persistent-session-files
    static_configs:
      - targets:
          - localhost
        labels:
          job: ctf-persistent-session-files
          source: persistent_file
          __path__: /var/lib/ctf-session-logs/*/*.log

    relabel_configs:
      - source_labels: [__path__]
        regex: '/var/lib/ctf-session-logs/([^/]+)-([0-9a-fA-F-]+)/([^/]+)\.log'
        target_label: participant_id
        replacement: '$1'
      - source_labels: [__path__]
        regex: '/var/lib/ctf-session-logs/([^/]+)-([0-9a-fA-F-]+)/([^/]+)\.log'
        target_label: workspace_id
        replacement: '$2'
      - source_labels: [__path__]
        regex: '/var/lib/ctf-session-logs/([^/]+)-([0-9a-fA-F-]+)/([^/]+)\.log'
        target_label: log_file
        replacement: '$3'

  # Simple CTF Docker Container Logs Collection
  - job_name: ctf-docker-logs
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    
    relabel_configs:
      # 1) Tell Promtail which files to tail - CRITICAL FIX
      - source_labels: [__meta_docker_container_log_path]
        target_label: __path__

      # 2) Only process stdout/stderr streams
      - source_labels: [__meta_docker_container_log_stream]
        regex: '(stdout|stderr)'
        action: keep
      
      # 3) EXCLUDE log management containers only
      - source_labels: [__meta_docker_container_name]
        regex: '.*(ctf-loki|ctf-promtail|ctf-grafana|ctf-setup|ctf-status|ctf-docker-exporter).*'
        action: drop
      
      # 4) Extract container metadata
      - source_labels: [__meta_docker_container_name]
        target_label: container_name
      - source_labels: [__meta_docker_container_id]
        target_label: container_id
        regex: '(.{12})'
        replacement: '${1}'
      
      # 5) Extract labels if they exist
      - source_labels: [__meta_docker_container_label_participant_id]
        target_label: participant_id
        regex: '(.+)'
      - source_labels: [__meta_docker_container_label_workspace_id]
        target_label: workspace_id
        regex: '(.+)'
      - source_labels: [__meta_docker_container_label_coder_workspace_name]
        target_label: coder_workspace
        regex: '(.+)'
      - source_labels: [__meta_docker_container_label_coder_username]
        target_label: coder_username
        regex: '(.+)'
    
    pipeline_stages:
      # Docker log parsing
      - docker: {}

      # AGGRESSIVE DEBUG LOG FILTERING
      - match:
          selector: '{job="ctf-docker-logs"} |~ ".*\\[(debu|debug|info|error)\\].*"'
          action: drop
          drop_counter_reason: "debug_log"

      # Drop network/agent noise
      - match:
          selector: '{job="ctf-docker-logs"} |~ ".*(batch updating|collecting agent|disco ping|netcheck|net\\.tailnet|apphealth|accepted connection|got stats).*"'
          action: drop
          drop_counter_reason: "noise_log"

      # Drop reconnecting logs
      - match:
          selector: '{job="ctf-docker-logs"} |~ ".*(reconnecting|start reconnecting|computing stats).*"'
          action: drop
          drop_counter_reason: "connection_log"

      # Simple CTF log identification - just add labels for anything containing CTF
      - match:
          selector: '{job="ctf-docker-logs"} |~ ".*CTF.*"'
          stages:
            - labels:
                log_type: "ctf_log"
                
      # Identify setup logs specifically
      - match:
          selector: '{job="ctf-docker-logs"} |~ ".*CTF_SETUP.*"'
          stages:
            - labels:
                log_category: "setup"
                
      # Basic activity log identification (without parsing activity type for now)
      - match:
          selector: '{job="ctf-docker-logs"} |~ ".*CTF\\[.*\\].*"'
          stages:
            - labels:
                log_category: "activity"

      # File creation/modification metadata
      - match:
          selector: '{job="ctf-docker-logs"} |~ ".*\\[(FILE_CREATED|FILE_MODIFIED)\\] FILE:.*"'
          stages:
            - labels:
                log_category: "file_activity"
            - regex:
                expression: '.*\[(?P<event_type>FILE_CREATED|FILE_MODIFIED)\] FILE: (?P<file_path>[^ ]+) SIZE: (?P<file_size>\d+) OWNER: (?P<file_owner>[^ ]+) PERMS: (?P<file_perms>\d+)'
            - labels:
                event_type:
                file_path:
                file_owner:

      # Script execution tracking
      - match:
          selector: '{job="ctf-docker-logs"} |~ ".*\\[SCRIPT_EXEC\\].*"'
          stages:
            - labels:
                log_category: "script_execution"
            - regex:
                expression: '.*\[SCRIPT_EXEC\] PID:(?P<pid>\d+) PPID:(?P<ppid>\d+) USER:(?P<exec_user>\w+) CMD: (?P<script_cmd>.*)'
            - labels:
                exec_user:

      # File content logs (multiline script contents)
      - match:
          selector: '{job="ctf-docker-logs"} |~ ".*CONTENT_(START|END|LINE).*"'
          stages:
            - labels:
                log_category: "file_content"
            - regex:
                expression: '.*CONTENT_START: (?P<content_file>.*)'
            - labels:
                content_file:

  # CTF Setup Data - Specific collection for setup information
  - job_name: ctf-setup-data
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["session_type=ctf-comprehensive"]
    
    relabel_configs:
      - source_labels: [__meta_docker_container_label_participant_id]
        target_label: participant_id
      - source_labels: [__meta_docker_container_label_workspace_id]
        target_label: workspace_id
      - source_labels: [__meta_docker_container_name]
        target_label: container_name
    
    pipeline_stages:
      # Only process CTF_SETUP logs
      - match:
          selector: '{job="ctf-setup-data"} |~ "CTF_SETUP"'
          stages:
            - regex:
                expression: '.*CTF_SETUP\[(?P<participant>[^\]]+)\].*\[(?P<setup_type>[^\]]+)\] (?P<setup_data>.*)'
            - labels:
                log_type: "setup"
                setup_type:
                participant:
            - output:
                source: setup_data

      # Parse user credentials
      - match:
          selector: '{setup_type="USER_CREDENTIALS"}'
          stages:
            - regex:
                source: setup_data
                expression: '^(?P<username>[^:]+):(?P<password>.*)$'
            - labels:
                username:
                credential_type: "password"
            # Don't output the actual password for security
            - output:
                source: username

      # Parse flags
      - match:
          selector: '{setup_type="FLAG"}'
          stages:
            - regex:
                source: setup_data
                expression: '^(?P<flag_name>[^:]+):(?P<flag_path>[^:]+):(?P<flag_content>.*)$'
            - labels:
                flag_name:
                flag_path:
            # Don't output the actual flag content
            - output:
                source: flag_name

      # Parse database hashes
      - match:
          selector: '{setup_type="DATABASE_HASH"}'
          stages:
            - regex:
                source: setup_data
                expression: '^(?P<db_username>[^:]+):(?P<hash_value>[^:]+):(?P<hash_type>[^:]+):(?P<plaintext>.*)$'
            - labels:
                db_username:
                hash_type:
            # Don't output the actual hash or plaintext
            - output:
                source: db_username 
